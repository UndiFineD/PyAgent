rollback_procedures:
  automatic:
    - "Latency spike > 25%: Revert stage immediately"
    - "Error rate > 1%: Revert stage immediately"
    - "Data corruption detected: Immediate rollback + restore from backup"
  
  manual:
    - "Execute rollback_phase4_stage_N.sh in reverse order (8 → 1)"
    - "Estimated time: 30-45 minutes total"
    - "Verify all systems nominal before re-attempting"

