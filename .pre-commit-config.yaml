repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.14
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: stable
    hooks:
      - id: ruff
        additional_dependencies: [flake8]
  - repo: local
    hooks:
      - id: compile-all
        name: compile-all
        entry: python scripts/check_and_test.py
        language: system
        pass_filenames: false
