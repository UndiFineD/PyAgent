name: PyAgent Test + Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --prefer-binary -r requirements-ci.txt

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin & build runtime extension (unix)
        if: runner.os != 'Windows'
        working-directory: rust_core
        shell: bash
        run: |
          pip install maturin
          python -m maturin develop --release

      - name: Install maturin & build runtime extension (windows)
        if: runner.os == 'Windows'
        working-directory: rust_core
        shell: pwsh
        run: |
          pip install maturin
          python -m maturin develop --release

      - name: Run Python tests
        run: pytest -q

      - name: Run chat-specific tests
        run: pytest tests/test_chat_* -q

      # build documentation to ensure no broken links or formatting errors
      - name: Build docs
        run: mkdocs build --strict --clean

      - name: Run Rust unit tests
        working-directory: rust_core
        run: |
          # ensure the rust core compiles and its unit tests pass
          cargo test -- --test-threads=1

      - name: Upload tests directory as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-directory-${{ github.run_id }}-${{ matrix.os }}
          path: tests
          overwrite: true
