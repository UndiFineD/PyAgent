name: CI (minimal)

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV
      - name: Install dependencies
        run: pip install --prefer-binary -r requirements-ci.txt
      - name: Build Rust extension
        run: maturin develop --manifest-path rust_core/Cargo.toml
      - name: Run tests (shard ${{ matrix.shard }})
        run: |
          if [ "${{ matrix.shard }}" = "1" ]; then
            pytest tests/ci/ tests/structure/ tests/docs/ -n 2 -q
          elif [ "${{ matrix.shard }}" = "2" ]; then
            pytest tests/ --ignore=tests/ci --ignore=tests/structure --ignore=tests/docs \
                         --ignore=tests/core --ignore=tests/security --ignore=tests/integration \
                         --ignore=tests/agents --ignore=tests/observability --ignore=tests/runtime \
                         --ignore=tests/tools --ignore=tests/fixtures \
                         -n 2 -q
          else
            pytest tests/core/ tests/security/ tests/integration/ tests/agents/ \
                   tests/observability/ tests/runtime/ tests/tools/ -n 2 -q
          fi