name: CI / Lightweight

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "prj[0-9][0-9][0-9][0-9][0-9][0-9][0-9]-*"]

jobs:
  quick:
    name: Quick Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install --prefer-binary -r requirements-ci.txt
      - name: Run pre-commit hooks
        run: pre-commit run --all-files
      - name: Run quick placeholder tests
        run: pytest tests/ci/test_placeholder_smoke.py -q