name: CI / Lightweight

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "prj[0-9][0-9][0-9][0-9][0-9][0-9][0-9]-*"]

jobs:
  quick:
    name: Quick Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          # cache: pip
      - name: Install dependencies
        run: pip install --prefer-binary -r requirements-ci.txt
      - name: Run pre-commit hooks
        run: pre-commit run --all-files
      - name: Run quick placeholder tests
        run: pytest tests/ci/test_placeholder_smoke.py -q
      - name: Run backend OpenAPI drift check
        run: pytest tests/docs/test_backend_openapi_drift.py -q
      - name: Mypy strict allowlist lane (warn only, phase-1)
        continue-on-error: true
        run: |
          python -m mypy --config-file pyproject.toml \
            src/core/base/mixins/base_behavior_mixin.py \
            src/core/base/mixins/host_contract.py \
            src/core/base/mixins/shim_registry.py \
            src/core/agent_registry.py \
            src/core/agent_state_manager.py
      - name: Mypy broad visibility lane (warn only)
        continue-on-error: true
        run: python -m mypy --config-file mypy.ini src
      - name: Run rust benchmark smoke
        run: |
          pushd rust_core
          cargo bench --bench stats_baseline -- --noplot
          popd
          test -d rust_core/target/criterion/