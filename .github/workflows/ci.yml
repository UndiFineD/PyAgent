name: CI (minimal)

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV
      - name: Install dependencies
        run: pip install --prefer-binary -r requirements-ci.txt
      - name: Build Rust extension
        run: maturin develop --manifest-path rust_core/Cargo.toml
      - name: Run tests
        run: pytest -q