name: Quality

permissions:
  contents: read
  packages: read

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run linters
        run: |
          python -m ruff check src tests
          python -m mypy src

      - name: Run meta-tests
        run: pytest -q tests/ztest_zzz_tests_quality.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust checks
        run: |
          cargo fmt --manifest-path rust_core/Cargo.toml --all -- --check
          cargo clippy --manifest-path rust_core/Cargo.toml --all-targets --all-features
          cargo test --manifest-path rust_core/Cargo.toml --release
