name: Quality Gate (ruff + mypy + coverage)

on:
  push:
    branches:
      - "prj0000026-*"
      - main
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check src/ --config pyproject.toml

  typecheck:
    name: Mypy type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install mypy
      - name: Run mypy (warning-only mode)
        run: mypy src/core/ --ignore-missing-imports --no-error-summary || true

  coverage:
    name: Pytest with coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install -r requirements-ci.txt
      - name: Run quality-gate tests
        run: |
          pytest tests/test_lint_config.py tests/test_coverage_config.py -v
      - name: Run full suite with coverage
        run: |
          pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=1 || true
