name: Security / Lightweight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security_smoke:
    name: Secret Scan Guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Run secret scan (tree profile)
        run: python scripts/security/run_secret_scan.py --profile tree --fail-on-severity HIGH
