name: pip-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: Run pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Build CI requirements files
        run: |
          grep -vE '^win32_setctime==' requirements.txt > requirements-ci.txt
          grep -vE '^win32_setctime==' docs/architecture/requirements.txt > docs-architecture-requirements-ci.txt

      - name: Run pip-audit
        run: |
          python -m pip_audit -r requirements-ci.txt -r docs-architecture-requirements-ci.txt
